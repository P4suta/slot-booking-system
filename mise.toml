# mise (https://mise.jdx.dev/) tool configuration for the template repo
# itself. Engine builds, layer authoring, and template-side CI all run
# through these tools. Generated repositories receive their own mise.toml
# from the `core` layer with project-specific picks.

[tools]
# Day-1 generic CLIs needed regardless of which layers are applied.
# Backends:
#   - "github:owner/repo"  — pull a published release asset.
#   - "cargo:crate"        — build via `cargo install`.
#   - "npm:package"        — npm package (Node-native tools only).
just                          = "latest"
lefthook                      = "latest"
"github:crate-ci/typos"      = "latest"
actionlint                    = "latest"
# `yamllint` is a Python tool. mise resolves it to `pipx:yamllint`,
# which requires `pipx` on PATH; rather than couple the dev setup to
# a Python toolchain that isn't otherwise needed, install it via the
# system package manager when contributors want the YAML lint pass:
#   apt install yamllint   (Debian/Ubuntu)
#   brew install yamllint  (macOS)
"npm:markdownlint-cli2"      = "latest"
"github:crate-ci/committed"  = "latest"

# The engine is a Rust binary; we build it from source on demand.
rust = "1.95.0"

# Cargo plugins used by `just test` / `just audit` / `just coverage`.
# These resolve to `cargo install` builds; the first `mise install`
# pays the build cost once and caches the binary thereafter.
"cargo:cargo-nextest"  = "latest"
"cargo:cargo-deny"     = "latest"
"cargo:cargo-llvm-cov" = "latest"
