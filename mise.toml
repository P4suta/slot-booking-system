# mise (https://mise.jdx.dev/) — host-side tools only.
#
# All TypeScript / Cloudflare work runs inside the Docker dev container
# (see `docker-compose.yml`). The host only needs:
#   - just           : drives the recipes that delegate to the container
#   - lefthook       : fires git hooks; the heavy work inside still runs
#                      via `just <recipe>` → container
#   - committed      : commit-msg validation; cheap, host-local
#   - typos          : optional host-side typo check
#   - actionlint     : optional host-side workflow lint
#   - markdownlint   : optional host-side markdown lint
#   - websocat       : drives `just smoke-queue-ws` (WS projection feed)
#   - tsx            : runs the host-side TS orchestrators
#                      (`scripts/check.ts`, future `scripts/fuzz`,
#                      `scripts/diagnose`). Each orchestrator spawns
#                      `just <gate>` per child, so the gate *body*
#                      still executes inside the container — only the
#                      orchestration layer is host-resident.
#
# App-level Node / pnpm / wrangler / biome / vitest / tsc are
# deliberately NOT listed here — they live exclusively inside the
# container. (Node itself is provided host-side by the user-global
# mise install for tsx to dispatch on.)

[tools]
just                          = "latest"
lefthook                      = "latest"
"github:crate-ci/typos"      = "latest"
actionlint                    = "latest"
"npm:markdownlint-cli2"      = "latest"
"github:crate-ci/committed"  = "latest"
"github:vi/websocat"         = { version = "latest", bin = "websocat" }
"npm:tsx"                    = "latest"
