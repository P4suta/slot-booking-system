# lefthook (https://lefthook.dev/) — git hooks.
#
# Layered cadence:
#   pre-commit  — fast, runs only against staged files where possible.
#                 Biome + ESLint + typos + actionlint + comment-bans.
#                 Biome / ESLint run with `--write` / `--fix` so
#                 mechanically-fixable issues are patched + re-staged
#                 transparently (`stage_fixed: true`); only the
#                 non-fixable residue fails the commit. Heavy
#                 type-checking and tests are deferred to pre-push.
#   commit-msg  — conventional-commit format check via `committed`.
#   pre-push    — full pipeline: tsc, vitest, dependency-cruiser,
#                 comment-bans + strict-code greps. Read-only verify
#                 (CI parity) — auto-fix would race the commit being
#                 pushed.
#
# **Warnings fail commits**: every linter is invoked with the strictest
# exit-code policy it offers. Biome via `--error-on-warnings`, ESLint
# via `--max-warnings=0`, knip via `--treat-config-hints-as-errors`.
# Dependency-cruiser warnings are promoted to errors directly in
# `.dependency-cruiser.cjs` (severity `error`) since the CLI has no
# warnings-as-errors flag. The intent is one knob, in one place per
# tool — no hidden silent failures, no "fix later" warnings drifting.
#
# Heavy work runs inside the Docker dev container so the toolchain
# matches CI. Host needs only `just`, `lefthook`, `committed`, `typos`,
# `actionlint`, `markdownlint-cli2` (managed by mise).
#
# Install:   just hooks
# Uninstall: just hooks-uninstall

pre-commit:
  parallel: true
  skip:
    - rebase
    - merge
  commands:
    typos:
      run: typos {staged_files}
      glob: "*"
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
    biome-staged:
      glob: "**/*.{ts,tsx,js,mjs,cjs,svelte,json}"
      run: scripts/dev-exec.ts ./node_modules/.bin/biome check --write --error-on-warnings --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    eslint-staged:
      glob: "**/*.{ts,tsx,js,mjs,cjs,svelte}"
      run: scripts/dev-exec.ts ./node_modules/.bin/eslint --cache --cache-location node_modules/.cache/.eslintcache --fix --max-warnings 0 {staged_files}
      stage_fixed: true
    comment-bans-staged:
      glob: "**/*.{ts,tsx,js,mjs,cjs,svelte,md,sql,yaml,yml,toml}"
      run: scripts/lint/comment-bans.ts {staged_files}

commit-msg:
  commands:
    committed:
      run: committed --commit-file {1}

pre-push:
  parallel: false
  skip:
    - rebase
  commands:
    codegen:
      run: scripts/dev-exec.ts bash -c "cd apps/web && corepack pnpm run paraglide"
    typecheck:
      run: scripts/dev-exec.ts ./node_modules/.bin/tsc -b --pretty
    svelte-check:
      # svelte-check parses .svelte files (which tsc -b alone does
      # not) and surfaces TS / a11y / unused-CSS diagnostics. Run as
      # a hard gate: any svelte-check error OR warning fails the
      # push. Same intent as biome --error-on-warnings + eslint
      # --max-warnings 0 — "fix later" warnings never silently drift.
      run: scripts/dev-exec.ts bash -c "cd apps/web && corepack pnpm run check"
    biome-full:
      run: scripts/dev-exec.ts ./node_modules/.bin/biome check --error-on-warnings .
    eslint-full:
      run: scripts/dev-exec.ts ./node_modules/.bin/eslint . --max-warnings 0
    arch:
      run: scripts/dev-exec.ts ./node_modules/.bin/depcruise --validate .dependency-cruiser.cjs packages/core/src apps
    test:
      run: scripts/dev-exec.ts corepack pnpm exec tsx scripts/test/runner.ts @booking/core
    test-default:
      run: scripts/dev-exec.ts env TEST_DEADLINE=90 corepack pnpm exec tsx scripts/test/runner.ts default
    test-web:
      run: scripts/dev-exec.ts corepack pnpm exec tsx scripts/test/runner.ts web
    test-scripts:
      run: scripts/dev-exec.ts corepack pnpm exec tsx scripts/test/runner.ts @booking/scripts
    comment-bans-full:
      run: scripts/lint/comment-bans.ts
    strict-code:
      # Scope: packages/core/src only — the imperative shell in
      # apps/default/src/server/durableObjects/ runs outside the
      # Effect runtime and legitimately uses raw Date for alarm
      # scheduling / outbox recordedAt.
      run: |
        scripts/dev-exec.ts bash -c '! rg -n -t ts -e "\bnew Date\(|\bDate\.now\(|@ts-ignore|@ts-expect-error|: any\b" packages/core/src 2>/dev/null'
    dead-code:
      run: scripts/dev-exec.ts ./node_modules/.bin/knip --treat-config-hints-as-errors
    type-coverage:
      run: scripts/dev-exec.ts corepack pnpm -F @booking/core run type-coverage
