# lefthook (https://lefthook.dev/) git hooks.
#
# Heavy work (biome / tsc / vitest / dependency-cruiser) is delegated to
# the dev container via `just <recipe>`; cheap host-local checks (typos,
# actionlint, committed) run directly so commits stay fast.
#
# Install:   just hooks
# Uninstall: just hooks-uninstall

pre-commit:
  parallel: true
  skip:
    - rebase
    - merge
  commands:
    typos:
      run: typos
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint
    biome:
      glob: "**/*.{ts,tsx,js,mjs,cjs,svelte,json}"
      run: just lint-biome
    typecheck:
      glob: "**/*.{ts,tsx,svelte}"
      run: just typecheck
    arch:
      glob: "{packages,apps}/**/*.{ts,tsx,svelte}"
      run: just arch
    pii-guard:
      glob: "**/*.{ts,tsx,svelte,sql,md}"
      run: just pii-guard
    domain-purity:
      glob: "{packages,apps}/**/*.{ts,tsx,svelte,sql}"
      run: just domain-purity

commit-msg:
  commands:
    committed:
      run: committed --commit-file {1}

pre-push:
  parallel: true
  skip:
    - rebase
  commands:
    test:
      run: just test
