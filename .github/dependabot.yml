version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions-sha-bumps:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: "/.template/tmpl"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 20
    groups:
      engine-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
