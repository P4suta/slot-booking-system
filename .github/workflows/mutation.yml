name: mutation

# Manual-trigger only (per user rule: no `on.schedule` in repos —
# Dependabot is the sole exception). Run from the Actions tab when a
# baseline refresh is wanted, or after a substantial domain refactor.
on:
  workflow_dispatch:
    inputs:
      threshold:
        description: "Mutation score threshold (overrides stryker.config.json `break`)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: "1"

jobs:
  mutation:
    name: Stryker mutation testing on the queue domain + use cases
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dev container
        run: docker compose build dev

      - name: Install workspace deps
        run: docker compose run --rm dev corepack pnpm install --frozen-lockfile=false

      # Restore the previous mutation run's incremental cache so
      # Stryker only re-tests mutants whose source / test surface
      # actually changed. The cache key includes the mutate-scope
      # hash so a `stryker.config.json` edit invalidates correctly.
      - name: Restore Stryker incremental cache
        uses: actions/cache@v5
        with:
          path: packages/core/.stryker-tmp
          key: stryker-${{ runner.os }}-${{ hashFiles('packages/core/src/**', 'packages/core/stryker.config.json') }}
          restore-keys: |
            stryker-${{ runner.os }}-

      - name: Run Stryker (incremental)
        run: |
          docker compose run --rm dev corepack pnpm \
            -F @booking/core run test:mutation -- --incremental \
            ${{ inputs.threshold && format('--threshold-break {0}', inputs.threshold) || '' }}

      - name: Upload mutation HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-html-report
          path: packages/core/reports/mutation
          retention-days: 30

      - name: Upload incremental cache
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-incremental-cache
          path: packages/core/.stryker-tmp
          retention-days: 7
