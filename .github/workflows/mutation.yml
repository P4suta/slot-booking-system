name: mutation

# Manual-trigger only (per user rule: no `on.schedule` in repos —
# Dependabot is the sole exception). Run from the Actions tab when a
# baseline refresh is wanted, or after a substantial domain refactor.
on:
  workflow_dispatch:
    inputs:
      threshold:
        description: "Mutation score threshold (overrides stryker.config.json `break`)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: "1"

jobs:
  mutation:
    name: Stryker mutation testing on the pure domain
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev container
        run: docker compose build dev

      - name: Install workspace deps
        run: docker compose run --rm dev corepack pnpm install --frozen-lockfile=false

      - name: Run Stryker (incremental)
        run: |
          docker compose run --rm dev corepack pnpm \
            -F @booking/core run test:mutation -- --incremental \
            ${{ inputs.threshold && format('--threshold-break {0}', inputs.threshold) || '' }}

      - name: Upload mutation HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-html-report
          path: packages/core/reports/mutation
          retention-days: 30

      - name: Upload incremental cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-incremental-cache
          path: packages/core/.stryker-tmp
          retention-days: 7
