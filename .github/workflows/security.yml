name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Schedule trigger intentionally omitted: ~/.claude/CLAUDE.md §5
  # forbids `on.schedule` (Dependabot weekly is the only exception).
  # Push + PR cover the regression-detection envelope.

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
