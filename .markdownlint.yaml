default: true

# Allow long lines for tables and reference-style links.
MD013: false
# Allow inline HTML — needed for ADRs that embed diagrams or details/summary.
MD033: false
# Permit duplicate headings across sibling layer READMEs.
MD024:
  siblings_only: true
# Permit bare URLs in inline contexts (issue references, command output).
MD034: false
# Allow either `*` or `-` as the unordered-list marker. ADRs and
# template-author files in the wild use both; forcing one is churn
# without information value.
MD004: false
# Files that legitimately do not start with an H1 — issue / PR
# templates, partial fragments, ADR boilerplate. Skip the
# first-line-heading check on those rather than coerce them.
MD041:
  level: 1
  front_matter_title: '^\s*title\s*[:=]'
  ignore_paths:
    - "**/PULL_REQUEST_TEMPLATE.md"
    - "**/ISSUE_TEMPLATE/**"

# Table column style — strict "consistent" enforcement forces hand-
# aligning every table cell when a row's content length changes,
# which is editorial churn without information value. The
# information that matters (column boundaries, header separator)
# is enforced by the parser, not by this rule.
MD060: false

# Ignore generated outputs.
ignores:
  - "target/"
  - ".template/tmpl/target/"
  - "**/CHANGELOG.md"
  - "**/PULL_REQUEST_TEMPLATE.md"
  - "**/ISSUE_TEMPLATE/**"
  - "apps/web/src/paraglide/**"
  # serena MCP の investigation note は gitignore 配下、 lint 対象外。
  - ".serena/**"
