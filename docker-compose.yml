services:
  # Default dev container — wrangler dev (apps/default, port 8787),
  # tsc / vitest / biome / typecheck. apps/web の vite dev は port
  # 衝突を避けるため `dev-web` service に分離。
  #
  # `user:` runs the container as the host's UID/GID (defaults to
  # 1000:1000, the typical Linux desktop user). Without this the
  # container runs as root, codegen / paraglide / pnpm install
  # produce root-owned files in the bind-mounted workspace, and
  # any host-side `pnpm` call later trips EACCES. UID / GID are
  # read from a `.env` file at the repo root (see `.env.example`).
  dev:
    build:
      context: .
      target: dev
    image: slot-booking-system-dev:latest
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      PNPM_HOME: /workspace/.pnpm-home
      PATH: /workspace/.pnpm-home:/usr/local/bin:/usr/bin:/bin
    ports:
      - "8787:8787"
    volumes:
      - .:/workspace:rw
      - pnpm-store:/workspace/.pnpm-store
      - pnpm-home:/workspace/.pnpm-home
    working_dir: /workspace
    tty: true
    stdin_open: true

  # apps/web の vite dev (port 5173)。 同じ image / volume を再利用
  # するので別 service にしてもメモリ / disk のオーバーヘッドはほぼゼロ。
  # `just dev-web` で起動し、 `just dev-default` (port 8787) と並走可。
  dev-web:
    build:
      context: .
      target: dev
    image: slot-booking-system-dev:latest
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      PNPM_HOME: /workspace/.pnpm-home
      PATH: /workspace/.pnpm-home:/usr/local/bin:/usr/bin:/bin
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace:rw
      - pnpm-store:/workspace/.pnpm-store
      - pnpm-home:/workspace/.pnpm-home
    working_dir: /workspace
    tty: true
    stdin_open: true

  ci:
    build:
      context: .
      target: ci
    image: slot-booking-system-ci:latest
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      PNPM_HOME: /workspace/.pnpm-home
      PATH: /workspace/.pnpm-home:/usr/local/bin:/usr/bin:/bin
    volumes:
      - .:/workspace:ro
      - pnpm-store:/workspace/.pnpm-store
      - pnpm-home:/workspace/.pnpm-home
    working_dir: /workspace

  # Observability stack — opt-in via `--profile observability`.
  # Brought up by `just dev-up` so dev runs surface child spans in
  # Jaeger. Stays out of the default profile because contributors
  # without it set should still get a fast `dev` recipe.
  otel-collector:
    profiles: [observability]
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./apps/default/dev/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4318:4318" # OTLP/HTTP receiver (host-side curl debugging)
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    profiles: [observability]
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI

volumes:
  pnpm-store: {}
  pnpm-home: {}
