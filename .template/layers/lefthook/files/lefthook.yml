# lefthook (https://lefthook.dev/) git hooks.
#
# Install:   just hooks
# Uninstall: just hooks-uninstall

pre-commit:
  parallel: true
  skip:
    - rebase
    - merge
  commands:
    typos:
      run: typos
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint
    yamllint:
      glob: "**/*.{yml,yaml}"
      run: yamllint
    markdownlint:
      glob: "**/*.md"
      run: markdownlint-cli2 "**/*.md" "#target"

pre-push:
  parallel: true
  skip:
    - rebase
  commands: {}
