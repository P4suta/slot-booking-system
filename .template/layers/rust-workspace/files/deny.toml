# cargo-deny configuration. Run via `just audit`.

[advisories]
yanked = "deny"
ignore = []

[licenses]
# Licenses accepted on direct + transitive deps. Curated for the most
# common permissive-OSS licenses. Add to this list deliberately —
# every `allow` entry is a downstream commitment.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards         = "deny"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
