name: Bug report
description: Report a defect.
labels: ["bug"]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps that reproduce the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
