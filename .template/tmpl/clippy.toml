# clippy thresholds — adapted from afm's clippy.toml. Tighter than clippy's
# defaults so creeping complexity is caught at the gate, not in review.

doc-valid-idents = [
    "..",
    "DAG",
    "Kahn",
    "Tarjan",
    "BLAKE3",
    "JSON",
    "TOML",
    "YAML",
    "GitHub",
    "MADR",
    "ADR",
    "MIT",
]

# 4 args max; anything beyond becomes a parameter struct.
too-many-arguments-threshold = 4

# Single-screen functions: 80 lines hard cap.
too-many-lines-threshold = 80

# Force extract-method refactors earlier than clippy's default of 25.
cognitive-complexity-threshold = 18

type-complexity-threshold = 250

# Two or more bool params is a smell; pass an enum instead.
max-fn-params-bools = 1

# Variants sharing a prefix are clearer when factored.
enum-variant-name-threshold = 2
enum-variant-size-threshold = 256

msrv = "1.95.0"

# Tests own their failures expressively.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests  = true

# Pre-1.0; don't gate API churn on existing exports.
avoid-breaking-exported-api = false

# Surface large pass-by-value moves at the lint level.
pass-by-value-size-limit = 128

disallowed-methods = [
    { path = "std::mem::forget",     reason = "leaks destructors; use `ManuallyDrop` or explicit drop" },
    { path = "std::env::set_var",    reason = "races with other threads; thread Options through APIs instead" },
    { path = "std::env::remove_var", reason = "see std::env::set_var" },
    { path = "std::process::exit",   reason = "bypasses destructors; return ExitCode from main" },
]

disallowed-types = [
    { path = "std::sync::RwLock", reason = "parking_lot preferred where contention matters; raise an ADR to opt in" },
]
