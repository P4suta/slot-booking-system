# cargo-deny configuration for the engine crate.
# Run via `just audit` (or directly: `cargo deny --manifest-path .../Cargo.toml check`).

[advisories]
yanked = "deny"
ignore = []

[licenses]
# Licenses we accept on direct + transitive deps. The list is the
# union of what the engine's current dep tree pulls in (after `cargo
# deny check licenses`) plus a small safety margin for common
# permissive-OSS licenses we expect to encounter as the tree grows.
# Any license not on this list will reject the build at CI time —
# evaluate before adding.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards         = "deny"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
