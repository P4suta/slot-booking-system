# Wrangler config for the generic demo deployment of the queue pivot.
# Replace `database_id` with a real D1 id before deploying anywhere
# beyond `wrangler dev --local`.

name = "default"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
account_id = ""

[observability]
enabled = false

[[d1_databases]]
binding = "DB"
database_name = "default-booking"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "QUEUE_SHOP"
class_name = "QueueShop"

# Cloudflare rate-limit bindings (production only — Miniflare leaves
# the binding undefined and the middleware fails open under
# `wrangler dev --local`). namespace_id is opaque to the binding;
# the (limit, period) tuple is the real contract.
#   - RL_ISSUE  60 requests / minute, keyed on cf-connecting-ip
#   - RL_OPERATE 300 requests / minute, keyed on x-staff-token
[[unsafe.bindings]]
name = "RL_ISSUE"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[[unsafe.bindings]]
name = "RL_OPERATE"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 300, period = 60 }

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DaySchedule"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["QueueShop"]
deleted_classes = ["DaySchedule"]

[vars]
DEPLOYMENT_NAME = "default"
DEPLOYMENT_TIMEZONE = "UTC"
IS_DEV = "0"
OTEL_EXPORTER_URL = "disabled"
NO_SHOW_TIMEOUT_SECONDS = "300"
ALLOWED_ORIGINS = ""
# STAFF_SESSION_SECRET is no longer wired in wrangler.toml so the
# repo never carries a placeholder secret value (gitleaks-clean).
# Local dev overrides come from `apps/default/.dev.vars`
# (gitignored — see `.dev.vars.example`); production rotates the
# real secret through `wrangler secret put STAFF_SESSION_SECRET`.

# Daily cron at 04:00 UTC. Drives the `scheduled` handler in
# `src/worker.ts` which NULLs PII fields on tickets whose terminal
# state was reached more than 2 years ago (ADR-0009 / SYSTEM §6).
[triggers]
crons = ["0 4 * * *"]
