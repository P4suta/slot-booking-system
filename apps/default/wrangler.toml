# Wrangler config for the generic demo deployment of the queue pivot.
# Replace `database_id` with a real D1 id before deploying anywhere
# beyond `wrangler dev --local`.

name = "default"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
account_id = ""

[observability]
enabled = false

[[d1_databases]]
binding = "DB"
database_name = "default-booking"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "QUEUE_SHOP"
class_name = "QueueShop"

# Cloudflare rate-limit bindings (production only — Miniflare leaves
# the binding undefined and the middleware fails open under
# `wrangler dev --local`). namespace_id is opaque to the binding;
# the (limit, period) tuple is the real contract.
#   - RL_ISSUE  60 requests / minute, keyed on cf-connecting-ip
#   - RL_OPERATE 300 requests / minute, keyed on x-staff-token
#   - RL_VERIFY 30 requests / minute, keyed on cf-connecting-ip
#     (covers /tickets/me, /tickets/:id/cancel, /tickets/:id/check-in;
#     slows brute force on the 4-digit phone-last-4 + kana pair)
[[unsafe.bindings]]
name = "RL_ISSUE"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[[unsafe.bindings]]
name = "RL_OPERATE"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 300, period = 60 }

[[unsafe.bindings]]
name = "RL_VERIFY"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 30, period = 60 }

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DaySchedule"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["QueueShop"]
deleted_classes = ["DaySchedule"]

[vars]
DEPLOYMENT_NAME = "default"
# DEPLOYMENT_TIMEZONE — IANA TZ name; the slot grid + ETA + alarm
# sweep all read this. Customer-facing copy is Japanese, so the
# business default is "Asia/Tokyo". Overridable per-deployment if
# a second shop ships in a different region; the router code falls
# back to "Asia/Tokyo" if this var is somehow absent at runtime so
# slot math never crashes on a misconfigured deploy (ADR-0070
# §Defensive defaults).
DEPLOYMENT_TIMEZONE = "Asia/Tokyo"
IS_DEV = "0"
OTEL_EXPORTER_URL = "disabled"
# Default service-time (seconds) after which a Called ticket is
# auto-marked NoShow by the alarm sweep. 300s = 5 minutes matches
# typical retail call-and-arrival windows; longer windows leave
# ghost tickets in the queue, shorter ones risk false NoShows.
NO_SHOW_TIMEOUT_SECONDS = "300"
# Default per-slot capacity (= concurrent reservations per bucket).
# Customer reservation flow uses this when the deployment has no
# per-bucket override. Production deployments override per shop.
SLOT_DEFAULT_CAPACITY = "2"
# Default slot granularity (minutes per bucket). 15 / 30 / 60.
# Customer slot picker reads this for the grid step.
SLOT_DEFAULT_GRANULARITY = "30"
# Production deployments populate this with the front-end origin
# (e.g. "https://shop.example.com"). Empty string means no
# cross-origin access; IS_DEV=1 grants a wildcard for local dev.
ALLOWED_ORIGINS = ""
# STAFF_SESSION_SECRET is no longer wired in wrangler.toml so the
# repo never carries a placeholder secret value (gitleaks-clean).
# Local dev overrides come from `apps/default/.dev.vars`
# (gitignored — see `.dev.vars.example`); production rotates the
# real secret through `wrangler secret put STAFF_SESSION_SECRET`.

# Daily cron at 04:00 UTC. Drives the `scheduled` handler in
# `src/worker.ts` which NULLs PII fields on tickets whose terminal
# state was reached more than 2 years ago (ADR-0009 / SYSTEM §6).
[triggers]
crons = ["0 4 * * *"]
