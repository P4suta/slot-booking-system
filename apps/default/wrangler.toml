# Wrangler config for the generic demo deployment.
# Replace `database_id` with a real D1 id before deploying anywhere
# beyond `wrangler dev --local`.

name = "default"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
account_id = ""

[observability]
enabled = false

[[d1_databases]]
binding = "DB"
database_name = "default-booking"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "DAY_SCHEDULE"
class_name = "DaySchedule"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DaySchedule"]

[vars]
DEPLOYMENT_NAME = "default"
DEPLOYMENT_TIMEZONE = "UTC"
# `IS_DEV` flips RuntimeMode (ADR-0042). Default is `"0"` so any
# `wrangler deploy` lands in production mode; `wrangler dev -e dev`
# overrides through `[env.dev.vars]` below.
IS_DEV = "0"
# OTel exporter triage (ADR-0042 + ADR-0044): `"disabled"` drops
# spans through a NoopSpanExporter so the worker never opens a
# network round-trip to a non-existent collector. Override with a
# concrete OTLP URL when wiring an actual deploy-side collector;
# `"console"` falls back to `ConsoleSpanExporter` (stdout, dev local).
OTEL_EXPORTER_URL = "disabled"
# Local-dev secret used by `signSlot` / `verifySlotToken`. The value
# is a deterministic 32-byte hex string so the local fixtures (curl
# smoke, SvelteKit dev) can sign and verify without coordinating an
# out-of-band secret. Production deployments rotate this through
# `wrangler secret put SLOT_HMAC_SECRET`.
SLOT_HMAC_SECRET = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

# Dev environment overrides. `wrangler dev -e dev` (the `dev` npm
# script appends `-e dev`) flips `IS_DEV` so the worker can switch
# adapters off the `RuntimeMode` port — verbose error extensions,
# permissive log sampling, console OTel exporter — without leaking
# those affordances into deploy targets. The OTel endpoint points
# to `otel-collector` because `just dev-up` brings the container up
# under the `observability` docker-compose profile (Phase 3 PR#8).
[env.dev.vars]
IS_DEV = "1"
OTEL_EXPORTER_URL = "http://otel-collector:4318/v1/traces"

# Daily cron at 04:00 UTC. Drives the `scheduled` handler in
# `src/worker.ts` which NULLs PII fields on bookings whose terminal
# state was reached more than 2 years ago (ADR-0009 / SYSTEM §6).
[triggers]
crons = ["0 4 * * *"]
