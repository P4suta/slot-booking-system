# Wrangler config for the generic demo deployment.
# Replace `database_id` with a real D1 id before deploying anywhere
# beyond `wrangler dev --local`.

name = "default"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
account_id = ""

[observability]
enabled = false

[[d1_databases]]
binding = "DB"
database_name = "default-booking"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "DAY_SCHEDULE"
class_name = "DaySchedule"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DaySchedule"]

[vars]
DEPLOYMENT_NAME = "default"
DEPLOYMENT_TIMEZONE = "UTC"

# Daily cron at 04:00 UTC. Drives the `scheduled` handler in
# `src/worker.ts` which NULLs PII fields on bookings whose terminal
# state was reached more than 2 years ago (ADR-0009 / SYSTEM §6).
[triggers]
crons = ["0 4 * * *"]
