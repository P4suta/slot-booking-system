# Wrangler config for the generic demo deployment.
# Replace `database_id` with a real D1 id before deploying anywhere
# beyond `wrangler dev --local`.
#
# Phase 0 of the queue-pivot (ADR-0050) drops the DaySchedule DO
# binding, the slot-token HMAC secret, and the daily PII-purge cron.
# Phase 2 reintroduces a `QueueShop` DO binding (single-writer actor),
# Phase 4 a `STAFF_SESSION_SECRET` for cookie-based staff auth.

name = "default"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
account_id = ""

[observability]
enabled = false

[[d1_databases]]
binding = "DB"
database_name = "default-booking"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[vars]
DEPLOYMENT_NAME = "default"
DEPLOYMENT_TIMEZONE = "UTC"
# `IS_DEV` flips RuntimeMode (ADR-0042). Default `"0"` so every
# `wrangler deploy` lands in production mode; `wrangler dev` flips the
# bit through `--var IS_DEV:1`.
IS_DEV = "0"
# OTel exporter triage (ADR-0044): `"disabled"` drops spans through a
# NoopSpanExporter so the Worker never opens a network round-trip to a
# non-existent collector.
OTEL_EXPORTER_URL = "disabled"
