# typos (https://github.com/crate-ci/typos) configuration.
# Named `_typos.toml` so it doesn't collide with tools matching `typos.*`.

[default]
extend-ignore-identifiers-re = [
    "[A-Fa-f0-9]{7,}",   # git SHAs in comments
    # TypeID-shaped strings (book_…, serv_…, clos_…, …). Both real and
    # synthetic-test prefixes (e.g. `clos_x`, `prov_aaa`).
    "(book|serv|prov|rsrc|clos|absn|bhrs|evnt|audt|idem)_[a-zA-Z0-9]+",
    # `_fixtures` directory name (not a typo of "fixture").
    "_fixtures",
]

[default.extend-words]
# Add project-specific words here as they crop up.
clos = "clos"   # TypeID prefix for Closure; not a typo of "close".

[files]
extend-exclude = [
    "target/",
    "coverage/",
    "*.lock",
    "*.snap",
]
